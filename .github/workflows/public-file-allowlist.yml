name: Public File Allowlist

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  public-file-allowlist:
    name: Block private vault files
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check pull request files
        if: github.event_name == 'pull_request'
        run: |
          bash tools/git/check-public-staged-files.sh --range "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"

      - name: Check pushed files
        if: github.event_name == 'push'
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            RANGE="${AFTER}^...${AFTER}"
          else
            RANGE="${BEFORE}...${AFTER}"
          fi

          bash tools/git/check-public-staged-files.sh --range "$RANGE"
