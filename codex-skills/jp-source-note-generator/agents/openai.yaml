interface:
  display_name: "JP Source Note Generator"
  short_description: "Create flexible Japanese source notes from transcripts, ListenKit artifacts, audio, video, or URLs."
  default_prompt: "Use $jp-source-note-generator to turn a ListenKit Markdown transcript, raw script, video URL, audio URL, or local audio/video file into a flexible Obsidian Japanese-learning source note. For media input, first prepare a stable artifact bundle with `zsh codex-skills/jp-source-note-generator/scripts/prepare-source-note-material.sh` using --url or --input, --artifact-dir, and an optional --stem; pass --engine apple only when the user explicitly requests Apple Speech. The wrapper delegates to ListenKit's Markdown workflow and reports the original source, ListenKit Markdown path, same-stem JSON path, finalized audio path, audio embed, and transcript-section status. First inspect enough material to identify likely directions such as grammar, vocabulary, writing, pronunciation, accent, expression, or mixed, then confirm the target note path, artifact directory when needed, note granularity, and any preferred note shape before writing. Keep the current vault paths as they are. Use the generated Markdown's ## Source for provenance and ## Transcript as the text source, and embed the original material path or URL, generated transcript Markdown path, finalized audio path, and an Obsidian audio embed such as ![[audio-name.m4a]]. Place transcript text after the study note body as an appendix, preferably under ## 附录：转写脚本. Default to one learning note; if cards are requested, create the source note first and then use the matching existing workflow, especially jp-review-material-maintainer for review material and vocabulary deduplication."

policy:
  allow_implicit_invocation: true
